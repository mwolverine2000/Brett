<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top 40 Time Machine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=20260614c" />
</head>
<body>
  <div class="bg-gradient"></div>

  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🎵</span>
        <span class="logo-text">Top 40 <em>Time Machine</em></span>
      </div>
      <p class="tagline">Travel back in time — discover what was playing on any date.</p>
    </div>
  </header>

  <main>
    <section class="picker-section">
      <div class="picker-card">
        <label for="date-input" class="picker-label">Pick a date in history</label>
        <div class="picker-row">
          <input
            type="date"
            id="date-input"
            min="1958-08-04"
            max=""
            value=""
          />
          <button id="go-btn" class="go-btn">Go</button>
        </div>
        <p class="picker-hint">Charts available from August 1958 to present</p>
      </div>
    </section>

    <section id="chart-section" class="chart-section hidden">
      <div class="chart-header">
        <div class="chart-title-block">
          <div class="chart-badge">Top 100</div>
          <h2 id="chart-title" class="chart-title"></h2>
          <p id="chart-subtitle" class="chart-subtitle"></p>
        </div>
      </div>

      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <span>Loading chart data…</span>
      </div>

      <div id="error-msg" class="error-msg hidden"></div>

      <ol id="song-list" class="song-list"></ol>
    </section>
  </main>

  <footer>
    <p>Chart data sourced from historical Top 100 archives.</p>
  </footer>

  <script src="app.js?v=20260614c"></script>
</body>
</html>
